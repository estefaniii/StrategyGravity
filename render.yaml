services:
  - type: web
    name: strategy-gravity
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js --web
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
